name: ubereats
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  intl_phone_number_input: ^0.7.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - "assets/images/"

  fonts:
    - family: UberMoveText
      fonts:
        - asset: assets/fonts/UberMoveTextRegular.otf
        - asset: assets/fonts/UberMoveTextMedium.otf
          weight: 500
        - asset: assets/fonts/UberMoveTextBold.otf
          weight: 700
        - asset: assets/fonts/UberMoveTextLight.otf
          weight: 300

