name: ubereats
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  intl_phone_field: ^3.2.0
  pinput: ^6.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - "assets/images/"

  fonts:
    - family: UberMoveText
      fonts:
        - asset: assets/fonts/UberMoveTextRegular.otf
        - asset: assets/fonts/UberMoveTextMedium.otf
          weight: 500
        - asset: assets/fonts/UberMoveTextBold.otf
          weight: 700
        - asset: assets/fonts/UberMoveTextLight.otf
          weight: 300

